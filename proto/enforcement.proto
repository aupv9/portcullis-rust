syntax = "proto3";

// CONTROL-PLANE COPY of the enforcement contract, owned by domain/server.
// Independent from portcullis's core/portcullis-rust/proto/enforcement.proto:
// two folders, one wire contract (same package wifihub.enforcement.v1, same
// field tags). This copy is the reconciled superset — it also declares the
// on-net/dev config RPCs and the config-over-stream ControlFrame/EngineFrame
// variants (tags 7-12 / 8-9) the engine will grow into.
//
// Wire-compat rule: never renumber/retype/reuse a field tag; only add new tags.
// When either side adds a field, mirror it here/there to keep the wire in sync.
package wifihub.enforcement.v1;

// Enforcement contract. Mutually authenticated with mTLS; the engine NEVER
// speaks RADIUS.
//
// ## Connection direction (CGNAT)
// Sites sit behind carrier-grade NAT and have no inbound reachability, so the
// **engine is the gRPC client**: it dials the control plane and holds a single
// long-lived bidirectional stream (`Attach`). Commands (grant/revoke/get/list)
// travel control-plane -> engine as `ControlFrame`s; events, acks and health
// travel engine -> control-plane as `EngineFrame`s.
//
// (The stream is named `Attach`, not `Connect`, because a `Connect` rpc collides
// with the tonic client's generated `connect` constructor.)
//
// The unary RPCs below are retained for on-net / dev / integration use where the
// control plane can reach the engine directly; they are not used behind CGNAT.
service Enforcement {
  // Production path (engine dials): one bidirectional stream carries everything.
  rpc Attach (stream EngineFrame) returns (stream ControlFrame);

  // On-net / dev only (control plane dials the engine).
  rpc GrantSession (GrantRequest) returns (GrantReply);
  rpc RevokeSession(RevokeRequest) returns (Ack);
  rpc GetSession   (Key)          returns (SessionInfo);
  rpc ListSessions (ListRequest)  returns (stream SessionInfo);
  rpc StreamEvents (StreamReq)    returns (stream SessionEvent); // engine -> control plane
  rpc Health       (Empty)        returns (HealthReply);

  // Config-push + introspection. Unary here for the on-net/dev path; behind
  // CGNAT the SAME commands travel as ControlFrame/EngineFrame variants (below)
  // so the control plane can drive an engine reachable only over Attach.
  rpc SetEnforcement     (SetEnforcementRequest)      returns (Ack);          // global on/off gate
  rpc SetGarden          (SetGardenRequest)           returns (Ack);          // control-plane-managed walled garden
  rpc SetTierPolicies    (SetTierPoliciesRequest)     returns (Ack);          // fleet-wide per-tier grant defaults
  rpc SetEngineParameters(SetEngineParametersRequest) returns (Ack);          // runtime timers + session cap
  rpc GetEngineInfo      (Empty)                       returns (EngineInfo);   // version, capabilities, cursor, config hashes
  rpc GetMetrics         (Empty)                       returns (MetricsReply); // runtime counters for fleet monitoring
}

// ---------------------------------------------------------------------------
// Bidirectional control channel (engine dials the control plane).
// ---------------------------------------------------------------------------

// engine -> control plane. `correlation_id` echoes the id of the ControlFrame
// this frame answers (0 for unsolicited frames: hello, events, health).
message EngineFrame {
  uint64 correlation_id = 1;
  oneof msg {
    Hello        hello    = 2; // first frame after Connect
    SessionEvent event    = 3; // lifecycle/accounting (was StreamEvents)
    CommandAck   ack      = 4; // terminal reply to grant/revoke
    SessionInfo  session  = 5; // a row answering get/list
    ListEnd      list_end = 6; // terminates a get/list response
    HealthReply  health   = 7; // reply to a Ping, or periodic
    EngineInfo   engine_info = 8; // reply to ControlFrame.get_engine_info
    MetricsReply metrics     = 9; // reply to ControlFrame.get_metrics
    ProvisionStatus provision_status = 10; // hotspot-provision lifecycle (P0.5); unsolicited on watchdog rollback
    WirelessStatus  wireless_status  = 11; // CP-managed wireless (P-W1) lifecycle; unsolicited on watchdog rollback
    WirelessConfig  wireless_config  = 12; // reply to ControlFrame.get_wireless_config (keys REDACTED)
    WirelessLiveness wireless_liveness = 13; // on-air SSID liveness (P5); unsolicited, periodic poll of gated VIFs
  }
}

// control plane -> engine. `correlation_id` is echoed back in the answering
// EngineFrame(s) so overlapping requests can be matched.
message ControlFrame {
  uint64 correlation_id = 1;
  oneof msg {
    GrantRequest  grant  = 2;
    RevokeRequest revoke = 3;
    Key           get    = 4;
    ListRequest   list   = 5;
    Ping          ping   = 6; // heartbeat; engine replies with a HealthReply
    // Config-push + introspection over the stream (CGNAT path). Set* commands
    // are answered by an EngineFrame CommandAck; get_* by the matching reply.
    SetTierPoliciesRequest     set_tier_policies     = 7;
    SetGardenRequest           set_garden            = 8;
    SetEnforcementRequest      set_enforcement       = 9;
    SetEngineParametersRequest set_engine_parameters = 10;
    Empty                      get_engine_info       = 11; // -> EngineFrame.engine_info
    Empty                      get_metrics           = 12; // -> EngineFrame.metrics
    // Hotspot network provisioning (P0.5) — isolated portcullis-provision subsystem.
    // DEPRECATED by the CP-managed wireless family below (P-W1): a hotspot is just
    // one gated SSID in SetWirelessConfig. Kept only until the CP cuts over; the
    // tags stay RESERVED forever (never reuse 13/14).
    ProvisionHotspotRequest    provision_hotspot     = 13; // -> CommandAck (accepted; then applied-pending)
    ConfirmProvisionRequest    confirm_provision     = 14; // CP confirms a pending provision -> CommandAck
    // CP-managed wireless (P-W1): a full declarative desired-state of owned SSIDs.
    SetWirelessConfigRequest   set_wireless_config   = 15; // -> CommandAck (accepted; then applied-pending)
    ConfirmWirelessRequest     confirm_wireless      = 16; // CP confirms a pending wireless push -> CommandAck
    Empty                      get_wireless_config   = 17; // -> EngineFrame.wireless_config (keys redacted)
  }
}

// Sent once by the engine as the first frame after Connect. Lets the control
// plane reconcile (adopt/repair) against the engine's currently-authorized
// sessions — the kernel-as-truth adoption path (§7.8) carried over the wire.
message Hello {
  string store_id            = 1; // informational — identity is bound to the client cert
  string engine_version      = 2;
  repeated SessionInfo active = 3;
}

message CommandAck {
  bool   ok         = 1;
  string message    = 2; // error detail when !ok
  string session_id = 3; // set for a successful grant
}

message ListEnd {
  bool   ok      = 1;
  string message = 2;
}

message Ping {
  int64 ts_unix = 1;
}

message GrantRequest {
  string store_id    = 1;
  string client_mac  = 2; // primary identity (validated upstream via signed redirect)
  string client_ip   = 3; // optional / informational
  uint32 ttl_seconds = 4; // session length -> nft set-element timeout
  uint64 quota_bytes = 5; // 0 = unlimited
  uint64 rate_bps    = 6; // 0 = unlimited
  string tier        = 7; // public | home | retail
  string session_id  = 8; // control-plane issued (== RADIUS Acct-Session-Id)
}

message GrantReply {
  string session_id = 1;
  bool   accepted   = 2;
}

enum RevokeReason {
  REVOKE_ADMIN      = 0;
  REVOKE_QUOTA      = 1;
  REVOKE_MAC_CHANGE = 2;
}

message RevokeRequest {
  string       client_mac = 1;
  RevokeReason reason     = 2;
  // When true, after gating the client at L3 (remove from @auth + reap
  // conntrack) the engine ALSO sends an 802.11 deauth so the device drops off
  // Wi-Fi and reconnects into the captive portal, instead of sitting in the
  // "connected but no internet" limbo. Best-effort / L2 — never blocks the L3
  // revoke. Old engines ignore this field (proto3 forward-compat).
  bool         deauth     = 3;
}

message Ack {
  bool   ok      = 1;
  string message = 2;
}

message Key {
  string client_mac = 1;
}

message ListRequest {
  uint32 page_size  = 1; // 0 = server default
  string page_token = 2;
}

message SessionInfo {
  string session_id      = 1;
  string client_mac      = 2;
  string client_ip       = 3;
  string tier            = 4;
  int64  granted_at_unix = 5;
  uint32 expires_in_secs = 6;
  uint64 quota_bytes     = 7;
  uint64 rate_bps        = 8;
  uint64 bytes_in        = 9;
  uint64 bytes_out       = 10;
}

enum EventKind {
  GRANTED        = 0;
  INTERIM        = 1;
  EXPIRED        = 2;
  REVOKED        = 3;
  QUOTA_EXCEEDED = 4;
  IDLE_TIMEOUT   = 5; // no metered traffic within idle_timeout (Idle-Timeout)
}

message SessionEvent {
  string    session_id = 1;
  string    client_mac = 2;
  EventKind kind       = 3;
  uint64    bytes_in   = 4;
  uint64    bytes_out  = 5;
  int64     ts_unix    = 6;
  // Monotonic per engine boot, starting at 1 (epoch = EngineInfo.boot_id).
  // 0 = pre-replay engine. The control plane persists (boot_id, seq) as its
  // consumption cursor and resumes via StreamReq.resume_after_seq.
  uint64    seq        = 7;
}

message StreamReq {
  string store_id = 1;
  // Replay events with seq > resume_after_seq still in the engine's in-RAM
  // buffer, then continue live; if evicted, start at the oldest retained event.
  uint64 resume_after_seq = 2;
  // The boot_id the cursor belongs to; empty/mismatched => engine replays all.
  string boot_id = 3;
}

message HealthReply {
  bool backend_ok            = 1;
  bool kernel_table_present  = 2;
  bool cp_connected          = 3;
  bool last_reconcile_ok     = 4;
  bool enforcement_enabled   = 5; // global gate state (true = blocking unauth traffic)
}

// ---------------------------------------------------------------------------
// Config-push + introspection (carried unary on-net, or as ControlFrame/
// EngineFrame variants over Attach behind CGNAT).
// ---------------------------------------------------------------------------

message SetEnforcementRequest {
  bool enabled = 1;
}

message SetGardenRequest {
  repeated string fqdns = 1;
}

message TierPolicy {
  string tier        = 1; // [a-z0-9_-]{1,32} (conventional: public | home | retail); control plane owns the set
  uint32 ttl_seconds = 2; // 0 = unset -> engine built-in default (1800s)
  uint64 quota_bytes = 3; // 0 = unset -> unlimited
  uint64 rate_bps    = 4; // 0 = unset -> unlimited
}

message SetTierPoliciesRequest {
  repeated TierPolicy policies = 1;
}

message SetEngineParametersRequest {
  uint32 accounting_interval_secs = 1; // 0 = default 15;   bounds [1, 3600]
  uint32 garden_tick_secs         = 2; // 0 = default 30;   bounds [5, 3600]
  uint32 expiry_tick_secs         = 3; // 0 = default 1;    bounds [1, 60]
  uint32 max_sessions             = 4; // 0 = default 4096; bounds [1, 16384]
  // Idle-Timeout equivalent. UNLIKE the fields above, 0 = DISABLED (not a
  // default); when set, bounds are [30, 86400].
  uint32 idle_timeout_secs        = 5; // 0 = disabled;     bounds [30, 86400]
}

message EngineInfo {
  string version = 1;               // engine CARGO_PKG_VERSION, e.g. "0.4.0"
  string boot_id = 2;               // random per daemon start; event-seq epoch
  uint64 event_latest_seq = 3;      // 0 = no events emitted yet this boot
  uint64 event_oldest_seq = 4;      // oldest seq still replayable (0 = none)
  repeated string capabilities = 5; // e.g. "tier_policies","engine_params","event_replay","shaper"
  bool   enforcement_enabled = 6;
  string tier_policies_hash = 7;
  string engine_params_hash = 8;
  string garden_hash = 9;
  string wireless_config_hash = 10; // hash of the committed CP-managed wireless desired-state (P-W1 drift detection)
}

message MetricsReply {
  uint64 sessions_active           = 1;  // gauge
  uint64 grants_total              = 2;
  uint64 grant_failures_total      = 3;  // incl. writer/kernel errors during grant
  uint64 revokes_total             = 4;
  uint64 expires_total             = 5;
  uint64 quota_kills_total         = 6;
  uint64 events_emitted_total      = 7;  // == EventLog latest_seq
  uint64 events_evicted_total      = 8;  // events pushed out of the replay buffer
  uint64 shaper_failures_total     = 9;
  uint64 redirect_rejections_total = 10; // rate-limiter rejections on the :8080 responder
  uint64 rss_bytes                 = 11; // /proc/self/status VmRSS (0 if unreadable)
  uint64 uptime_secs               = 12;
  uint64 idle_kills_total          = 13; // sessions torn down for idle_timeout
}

// ---------------------------------------------------------------------------
// Hotspot network provisioning (P0.5). The engine's ISOLATED portcullis-provision
// subsystem renders a FIXED allowlist of UCI sections (network.br_hotspot,
// network.hotspot, wireless.wifi_hotspot, dhcp.hotspot), applies + reloads, then
// holds the change under a LOCAL commit-confirm watchdog: the control plane must
// send ConfirmProvision before confirm_timeout_secs or the engine ROLLS BACK
// (CGNAT has no inbound rescue). The inet wifihub enforcement table is never
// touched; this subsystem is fail-OPEN (rollback), unlike enforcement.
// ---------------------------------------------------------------------------

// Desired state of the hotspot network the engine should provision. Only the
// owned sections are ever written; br-lan / admin config is never touched.
message ProvisionHotspotRequest {
  string provision_id         = 1;  // control-plane issued; echoed in ProvisionStatus + ConfirmProvision
  string ssid                 = 2;  // public SSID
  string radio                = 3;  // wifi-device, e.g. "radio0" (empty = engine default)
  string encryption           = 4;  // "none" (open captive) | "psk2"...; empty = "none"
  string key                  = 5;  // PSK when encryption != none
  bool   isolate              = 6;  // AP client isolation
  string bridge_name          = 7;  // resulting L2 iface, e.g. "br-hotspot" (== enforcement hotspot_iface)
  string ipaddr               = 8;  // gateway IP on the hotspot net, e.g. "10.0.0.1"
  string netmask              = 9;  // e.g. "255.255.255.0"
  string dhcp_start           = 10; // dnsmasq pool start (host part), e.g. "10"
  string dhcp_limit           = 11; // pool size, e.g. "200"
  string dhcp_leasetime       = 12; // e.g. "2h"
  uint32 confirm_timeout_secs = 13; // local watchdog window; 0 = engine default (90); bounds [15, 600]
  bool   enabled              = 14; // true = provision/enable; false = teardown owned sections (also confirm-guarded)
}

// Control plane confirms a still-pending provision (it re-observed the engine
// healthy after apply). Must arrive before the watchdog fires.
message ConfirmProvisionRequest {
  string provision_id = 1;
}

enum ProvisionState {
  PROVISION_UNKNOWN         = 0;
  PROVISION_APPLIED_PENDING = 1; // applied + reloaded; awaiting ConfirmProvision within the window
  PROVISION_COMMITTED       = 2; // confirmed; change is permanent
  PROVISION_ROLLED_BACK     = 3; // watchdog fired (no confirm) -> reverted to snapshot
  PROVISION_FAILED          = 4; // apply/validation error -> no change persisted (or reverted)
}

// engine -> control plane: reports the lifecycle of a provision. Unsolicited
// (correlation_id 0) for watchdog-driven ROLLED_BACK; correlated for the rest.
message ProvisionStatus {
  string         provision_id = 1;
  ProvisionState state        = 2;
  string         message      = 3; // detail (error, iface, etc.)
  string         bridge_name  = 4; // resulting iface on COMMITTED (feeds enforcement scoping)
}

// ---------------------------------------------------------------------------
// CP-managed wireless (P-W1). Generalises hotspot provisioning: the engine owns
// an ownership-namespaced set of UCI sections (named `pc_<slug>_*`, stamped
// `option owner 'portcullis-wireless'`) for an ARBITRARY set of SSIDs. It NEVER
// touches lan / br-lan / admin / wan / the `inet wifihub` table (reserved
// denylist). A push is declarative desired-state, reconciled (set/delete diff)
// under the SAME commit-confirm watchdog: the CP must send ConfirmWireless before
// confirm_timeout_secs or the engine ROLLS BACK. `gated=true` SSIDs' resulting
// ifaces are fed into portcullis enforcement (captive gate); the rest are trusted.
// ---------------------------------------------------------------------------

// Network binding for one SSID. Day-1 mode: own-bridge + static subnet + DHCP.
message WirelessNetwork {
  string bridge_name    = 1; // owned L2 iface, e.g. "br-public" (must NOT be br-lan)
  string ipaddr         = 2; // gateway host addr on the subnet, e.g. "10.0.0.1"
  string netmask        = 3; // e.g. "255.255.255.0"
  string dhcp_start     = 4; // dnsmasq pool start (host part), e.g. "10"
  string dhcp_limit     = 5; // pool size, e.g. "200"
  string dhcp_leasetime = 6; // e.g. "2h"
  bool   dhcp_disabled  = 7; // true = bridged, no DHCP pool (rare)
}

// Firewall posture for one SSID's zone.
message WirelessFirewall {
  string egress_zone = 1; // zone this SSID forwards out through, e.g. "wan" (cable/4g). Must NOT be "lan".
}

// One SSID the engine should own. Only owned (pc_<slug>_*) sections are written.
message WirelessSsid {
  string slug        = 1;  // [a-z0-9_]{1,16}; owner-namespace key (sections pc_<slug>_*)
  string ssid        = 2;  // advertised SSID, 1..32
  repeated string radios = 3; // wifi-device(s) the AP attaches to, e.g. ["radio0","radio1"]
  string encryption  = 4;  // "none" (open captive) | "psk2" | "sae" | "sae-mixed"
  string key         = 5;  // PSK when encryption != none — SECRET; never logged, REDACTED in status/config
  bool   hidden      = 6;  // hide the SSID beacon
  bool   isolate     = 7;  // AP client isolation
  bool   gated       = 8;  // true = portcullis captive-gates the resulting iface
  WirelessNetwork  network  = 9;
  WirelessFirewall firewall = 10;
  // Phase 2 capacity/access-control (all optional; 0/empty = feature off):
  uint32 max_clients = 11; // maxassoc — max associated stations (0 = unlimited)
  string mac_policy  = 12; // "" | "disable" | "allow" (allow-list) | "deny" (deny-list)
  repeated string mac_list = 13; // MAC addresses for allow/deny (lowercase aa:bb:..)
  // Per-SSID bandwidth cap (SQM on the SSID's bridge). 0 = unlimited in that
  // direction. download = to client (ingress); upload = from client (egress).
  uint32 rate_down_kbps = 14;
  uint32 rate_up_kbps   = 15;
  // Phase 3 SSID fields (all optional; empty/false = engine default):
  string mode        = 16;   // "ap" (default) | "mesh" (future; rejected by validation for now)
  bool   ieee80211r  = 17;   // Fast Transition
  string ieee80211w  = 18;   // PMF: "" off | "1" optional | "2" required
}

// One permitted inter-SSID forwarding direction (P2 inter-SSID isolation policy).
// By default owned SSID zones CANNOT reach each other — fw3 denies inter-zone
// forwarding when no explicit rule exists, and the engine renders none. Each
// PeerAllow opens exactly one direction (from_slug -> to_slug); add both to make
// a pair bidirectional. Both slugs must name owned SSIDs in this desired-state.
message WirelessPeerAllow {
  string from_slug = 1; // source SSID slug (its firewall zone)
  string to_slug   = 2; // destination SSID slug (its firewall zone)
}

// Full declarative desired-state of the engine's owned SSIDs. The engine diffs
// this against its currently-owned sections and applies the minimal set/delete.
message SetWirelessConfigRequest {
  string config_version = 1;       // CP-issued; echoed in status + confirm (cursor/idempotency)
  repeated WirelessSsid ssids = 2; // empty = tear down ALL owned sections
  uint32 confirm_timeout_secs = 3; // local watchdog window; 0 = default 90; bounds [15, 600]
  // Inter-SSID allow-list (P2): permitted from->to forwarding directions between
  // owned SSID zones. Empty (default) = every SSID fully isolated from the others.
  repeated WirelessPeerAllow peer_allows = 4;
}

// CP confirms a still-pending wireless push before the watchdog fires.
message ConfirmWirelessRequest {
  string config_version = 1;
}

// Per-SSID outcome within a WirelessStatus.
message SsidResult {
  string slug    = 1;
  bool   ok      = 2;
  string message = 3;
  string iface   = 4; // resulting L2 iface (feeds enforcement scoping when gated)
}

// engine -> control plane: lifecycle of a wireless push. Reuses ProvisionState.
// Unsolicited (correlation_id 0) for watchdog-driven ROLLED_BACK; correlated else.
message WirelessStatus {
  string         config_version = 1;
  ProvisionState state          = 2; // APPLIED_PENDING | COMMITTED | ROLLED_BACK | FAILED
  repeated SsidResult per_ssid  = 3;
  string         message        = 4;
}

// Introspection reply to get_wireless_config. PSK keys are REDACTED (empty).
message WirelessConfig {
  string config_version = 1;
  repeated WirelessSsid ssids = 2;
}

// ---------------------------------------------------------------------------
// On-air SSID liveness (P5). Whereas WirelessStatus reports the LIFECYCLE of a
// config push (did it apply/commit/roll back), liveness reports the observed
// RADIO reality: for each gated VIF the engine owns, is the SSID actually
// broadcasting and how many stations are associated. The engine polls this on a
// timer (~30s) by shelling out on-device (iwinfo / ubus hostapd get_status /
// ubus iwinfo assoclist) and pushes it UP unsolicited as an EngineFrame. It is
// purely observational — never affects enforcement or config.
// ---------------------------------------------------------------------------

// Observed radio state of one gated SSID's VIF.
message SsidLiveness {
  string slug         = 1; // owner-namespace slug (matches WirelessSsid.slug)
  string iface        = 2; // observed VIF, e.g. "wlan0" / "phy0-ap0" (NOT the bridge)
  bool   broadcasting = 3; // hostapd state == ENABLED (beacon on the air)
  uint32 stations     = 4; // associated station count (assoclist length)
  int32  signal_dbm   = 5; // representative/strongest station signal in dBm (0 = unknown)
}

// engine -> control plane: a snapshot of on-air liveness across the gated VIFs.
// Unsolicited (correlation_id 0), emitted periodically. Missing/absent VIFs are
// simply omitted (best-effort — a missing tool or non-JSON reply skips that VIF).
message WirelessLiveness {
  string config_version = 1;         // the committed config this snapshot reflects (best-effort)
  repeated SsidLiveness per_ssid = 2;
  int64  ts_unix = 3;                // engine wall-clock when the snapshot was taken
}

message Empty {}
