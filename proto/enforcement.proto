syntax = "proto3";

// Contract shared with the Go control plane (TDD §7.5, Appendix A).
// Wire-compat rule: never renumber/retype/reuse a field tag; only add new tags.
package wifihub.enforcement.v1;

// Engine-side gRPC service. The Go control plane is the client; it also consumes
// a server-stream of SessionEvents. Transport is gRPC/tonic over the WireGuard
// overlay, mutually authenticated (mTLS). The engine NEVER speaks RADIUS.
service Enforcement {
  rpc GrantSession (GrantRequest) returns (GrantReply);
  rpc RevokeSession(RevokeRequest) returns (Ack);
  rpc GetSession   (Key)          returns (SessionInfo);
  rpc ListSessions (ListRequest)  returns (stream SessionInfo);
  rpc StreamEvents (StreamReq)    returns (stream SessionEvent); // engine -> control plane
  rpc Health       (Empty)        returns (HealthReply);
  rpc SetEnforcement(SetEnforcementRequest) returns (Ack); // global on/off gate
  rpc SetGarden      (SetGardenRequest)      returns (Ack); // control-plane-managed walled garden
  rpc SetTierPolicies(SetTierPoliciesRequest) returns (Ack); // fleet-wide per-tier grant defaults
  rpc SetEngineParameters(SetEngineParametersRequest) returns (Ack); // runtime timers + session cap
  rpc GetEngineInfo(Empty) returns (EngineInfo); // version, capabilities, event cursor, config hashes
}

// Toggle the engine's global enforcement gate. When disabled, the engine removes
// its FORWARD/PREROUTING jump rules so ALL traffic flows freely; the auth set and
// chains are left intact so re-enabling is instant and no session state is lost.
message SetEnforcementRequest {
  bool enabled = 1;
}

// Replace the pre-auth walled-garden FQDN list (full set, not a delta). The
// engine wires these to dnsmasq (ipset=) so their resolved IPs land in the
// garden ipsets. Requires dnsmasq-full on the router; on stock dnsmasq the engine
// stores the list but skips writing (ipset= would crash the resolver).
message SetGardenRequest {
  repeated string fqdns = 1;
}

// Fleet-wide grant defaults for one SSID tier. The engine fills any 0-valued
// per-grant field (see GrantRequest) from the tier's policy before applying the
// grant, so the control plane can manage per-tier defaults centrally instead of
// stamping every GrantRequest.
message TierPolicy {
  string tier        = 1; // "public" | "home" | "retail"
  uint32 ttl_seconds = 2; // 0 = unset -> engine built-in default (1800s)
  uint64 quota_bytes = 3; // 0 = unset -> unlimited
  uint64 rate_bps    = 4; // 0 = unset -> unlimited
}

// Replace the per-tier grant defaults (full set, not a delta — idempotent, like
// SetGarden). A tier absent from `policies` is reset to the engine built-in
// default. RAM-only on the engine: the control plane re-pushes on reconnect, so
// the engine never persists this to flash (§5.4 no-NAND).
message SetTierPoliciesRequest {
  repeated TierPolicy policies = 1;
}

// Full snapshot of the runtime-adjustable engine parameters. Every push
// replaces the whole set; 0 = reset that field to the engine built-in default.
// Out-of-bounds values are rejected (InvalidArgument). RAM-only on the engine:
// the control plane re-pushes on reconnect (never persisted to flash, §5.4).
// Lowering max_sessions below the live session count never evicts sessions —
// it only blocks new grants.
message SetEngineParametersRequest {
  uint32 accounting_interval_secs = 1; // 0 = default 15;   bounds [1, 3600]
  uint32 garden_tick_secs         = 2; // 0 = default 30;   bounds [5, 3600]
  uint32 expiry_tick_secs         = 3; // 0 = default 1;    bounds [1, 60]
  uint32 max_sessions             = 4; // 0 = default 4096; bounds [1, 16384]
}

message GrantRequest {
  string store_id    = 1;
  string client_mac  = 2; // primary identity (validated upstream via signed redirect)
  string client_ip   = 3; // optional / informational
  uint32 ttl_seconds = 4; // session length -> nft set-element timeout; 0 = use tier policy
  uint64 quota_bytes = 5; // 0 = use tier policy (see NOTE); explicit unlimited on a quota'd tier = u64::MAX
  uint64 rate_bps    = 6; // 0 = use tier policy (see NOTE); explicit unlimited on a rate-capped tier = u64::MAX
  string tier        = 7; // public | home | retail
  string session_id  = 8; // control-plane issued (== RADIUS Acct-Session-Id)
  // NOTE (behaviour change, SetTierPolicies): ttl_seconds/quota_bytes/rate_bps
  // == 0 no longer mean "built-in default"/"unlimited" directly — they mean
  // "use this tier's policy" (which may itself resolve to a built-in default or
  // to unlimited). A non-zero grant field always wins over the tier policy. To
  // grant an explicit-unlimited exception under a tier that has a quota/rate,
  // send u64::MAX (0 would inherit the tier's limit).
}

message GrantReply {
  string session_id = 1;
  bool   accepted   = 2;
}

enum RevokeReason {
  REVOKE_ADMIN      = 0;
  REVOKE_QUOTA      = 1;
  REVOKE_MAC_CHANGE = 2;
}

message RevokeRequest {
  string       client_mac = 1;
  RevokeReason reason     = 2;
}

message Ack {
  bool   ok      = 1;
  string message = 2;
}

message Key {
  string client_mac = 1;
}

message ListRequest {
  uint32 page_size  = 1; // 0 = server default
  string page_token = 2;
}

message SessionInfo {
  string session_id      = 1;
  string client_mac      = 2;
  string client_ip       = 3;
  string tier            = 4;
  int64  granted_at_unix = 5;
  uint32 expires_in_secs = 6;
  uint64 quota_bytes     = 7;
  uint64 rate_bps        = 8;
  uint64 bytes_in        = 9;
  uint64 bytes_out       = 10;
}

enum EventKind {
  GRANTED        = 0;
  INTERIM        = 1;
  EXPIRED        = 2;
  REVOKED        = 3;
  QUOTA_EXCEEDED = 4;
}

message SessionEvent {
  string    session_id = 1;
  string    client_mac = 2;
  EventKind kind       = 3;
  uint64    bytes_in   = 4; // session totals at emit time (not deltas)
  uint64    bytes_out  = 5;
  int64     ts_unix    = 6;
  // Monotonic per engine boot, starting at 1 (see EngineInfo.boot_id for the
  // epoch). 0 = event from a pre-0.4 engine (no replay support). The control
  // plane persists (boot_id, seq) as its consumption cursor and resumes with
  // StreamReq.resume_after_seq for at-least-once delivery.
  uint64    seq        = 7;
}

message StreamReq {
  string store_id = 1;
  // Replay events with seq > resume_after_seq that are still in the engine's
  // in-RAM replay buffer, then continue live. If the requested position has
  // already been evicted, the stream starts at the oldest retained event —
  // the client detects the gap by the first seq jumping past cursor+1.
  uint64 resume_after_seq = 2;
  // The boot_id the cursor belongs to. Empty or mismatching the engine's
  // current boot_id => the cursor is from another life; the engine replays
  // everything it has (the client resets its cursor from EngineInfo).
  string boot_id = 3;
}

// Engine self-description: version/capabilities for rollout management, the
// event-replay cursor bounds, and FNV-1a64 hashes of the control-plane-managed
// state so the CP can detect config drift cheaply (GetEngineInfo + compare
// beats re-pushing everything on a timer).
//
// Canonical forms hashed (MUST match the control plane's implementation;
// covered by shared test vectors on both sides):
//   tiers  : "home:{ttl_s}:{quota_bytes}:{rate_bps}|public:...|retail:..."
//            (tiers sorted alphabetically)
//   params : "{accounting_s}:{garden_s}:{expiry_s}:{max_sessions}"
//   garden : fqdns lowercased, sorted ascending, joined with "|" ("" if empty)
// Hash: FNV-1a 64-bit over UTF-8, rendered as 16 lowercase hex chars.
message EngineInfo {
  string version = 1;               // engine CARGO_PKG_VERSION, e.g. "0.4.0"
  string boot_id = 2;               // random per daemon start; event-seq epoch
  uint64 event_latest_seq = 3;      // 0 = no events emitted yet this boot
  uint64 event_oldest_seq = 4;      // oldest seq still replayable (0 = none)
  repeated string capabilities = 5; // e.g. "tier_policies","engine_params","event_replay","shaper"
  bool   enforcement_enabled = 6;
  string tier_policies_hash = 7;
  string engine_params_hash = 8;
  string garden_hash = 9;
}

message HealthReply {
  bool backend_ok            = 1;
  bool kernel_table_present  = 2;
  bool cp_connected          = 3;
  bool last_reconcile_ok     = 4;
  bool enforcement_enabled   = 5; // global gate state (true = blocking unauth traffic)
}

message Empty {}
