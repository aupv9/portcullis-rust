syntax = "proto3";

// CONTROL-PLANE COPY of the enforcement contract, owned by domain/server.
// Independent from portcullis's core/portcullis-rust/proto/enforcement.proto:
// two folders, one wire contract (same package wifihub.enforcement.v1, same
// field tags). This copy is the reconciled superset — it also declares the
// on-net/dev config RPCs and the config-over-stream ControlFrame/EngineFrame
// variants (tags 7-12 / 8-9) the engine will grow into.
//
// Wire-compat rule: never renumber/retype/reuse a field tag; only add new tags.
// When either side adds a field, mirror it here/there to keep the wire in sync.
package wifihub.enforcement.v1;

// Enforcement contract. Mutually authenticated with mTLS; the engine NEVER
// speaks RADIUS.
//
// ## Connection direction (CGNAT)
// Sites sit behind carrier-grade NAT and have no inbound reachability, so the
// **engine is the gRPC client**: it dials the control plane and holds a single
// long-lived bidirectional stream (`Attach`). Commands (grant/revoke/get/list)
// travel control-plane -> engine as `ControlFrame`s; events, acks and health
// travel engine -> control-plane as `EngineFrame`s.
//
// (The stream is named `Attach`, not `Connect`, because a `Connect` rpc collides
// with the tonic client's generated `connect` constructor.)
//
// The unary RPCs below are retained for on-net / dev / integration use where the
// control plane can reach the engine directly; they are not used behind CGNAT.
service Enforcement {
  // Production path (engine dials): one bidirectional stream carries everything.
  rpc Attach (stream EngineFrame) returns (stream ControlFrame);

  // On-net / dev only (control plane dials the engine).
  rpc GrantSession (GrantRequest) returns (GrantReply);
  rpc RevokeSession(RevokeRequest) returns (Ack);
  rpc GetSession   (Key)          returns (SessionInfo);
  rpc ListSessions (ListRequest)  returns (stream SessionInfo);
  rpc StreamEvents (StreamReq)    returns (stream SessionEvent); // engine -> control plane
  rpc Health       (Empty)        returns (HealthReply);

  // Config-push + introspection. Unary here for the on-net/dev path; behind
  // CGNAT the SAME commands travel as ControlFrame/EngineFrame variants (below)
  // so the control plane can drive an engine reachable only over Attach.
  rpc SetEnforcement     (SetEnforcementRequest)      returns (Ack);          // global on/off gate
  rpc SetGarden          (SetGardenRequest)           returns (Ack);          // control-plane-managed walled garden
  rpc SetTierPolicies    (SetTierPoliciesRequest)     returns (Ack);          // fleet-wide per-tier grant defaults
  rpc SetEngineParameters(SetEngineParametersRequest) returns (Ack);          // runtime timers + session cap
  rpc GetEngineInfo      (Empty)                       returns (EngineInfo);   // version, capabilities, cursor, config hashes
  rpc GetMetrics         (Empty)                       returns (MetricsReply); // runtime counters for fleet monitoring
}

// ---------------------------------------------------------------------------
// Bidirectional control channel (engine dials the control plane).
// ---------------------------------------------------------------------------

// engine -> control plane. `correlation_id` echoes the id of the ControlFrame
// this frame answers (0 for unsolicited frames: hello, events, health).
message EngineFrame {
  uint64 correlation_id = 1;
  oneof msg {
    Hello        hello    = 2; // first frame after Connect
    SessionEvent event    = 3; // lifecycle/accounting (was StreamEvents)
    CommandAck   ack      = 4; // terminal reply to grant/revoke
    SessionInfo  session  = 5; // a row answering get/list
    ListEnd      list_end = 6; // terminates a get/list response
    HealthReply  health   = 7; // reply to a Ping, or periodic
    EngineInfo   engine_info = 8; // reply to ControlFrame.get_engine_info
    MetricsReply metrics     = 9; // reply to ControlFrame.get_metrics
  }
}

// control plane -> engine. `correlation_id` is echoed back in the answering
// EngineFrame(s) so overlapping requests can be matched.
message ControlFrame {
  uint64 correlation_id = 1;
  oneof msg {
    GrantRequest  grant  = 2;
    RevokeRequest revoke = 3;
    Key           get    = 4;
    ListRequest   list   = 5;
    Ping          ping   = 6; // heartbeat; engine replies with a HealthReply
    // Config-push + introspection over the stream (CGNAT path). Set* commands
    // are answered by an EngineFrame CommandAck; get_* by the matching reply.
    SetTierPoliciesRequest     set_tier_policies     = 7;
    SetGardenRequest           set_garden            = 8;
    SetEnforcementRequest      set_enforcement       = 9;
    SetEngineParametersRequest set_engine_parameters = 10;
    Empty                      get_engine_info       = 11; // -> EngineFrame.engine_info
    Empty                      get_metrics           = 12; // -> EngineFrame.metrics
  }
}

// Sent once by the engine as the first frame after Connect. Lets the control
// plane reconcile (adopt/repair) against the engine's currently-authorized
// sessions — the kernel-as-truth adoption path (§7.8) carried over the wire.
message Hello {
  string store_id            = 1; // informational — identity is bound to the client cert
  string engine_version      = 2;
  repeated SessionInfo active = 3;
}

message CommandAck {
  bool   ok         = 1;
  string message    = 2; // error detail when !ok
  string session_id = 3; // set for a successful grant
}

message ListEnd {
  bool   ok      = 1;
  string message = 2;
}

message Ping {
  int64 ts_unix = 1;
}

message GrantRequest {
  string store_id    = 1;
  string client_mac  = 2; // primary identity (validated upstream via signed redirect)
  string client_ip   = 3; // optional / informational
  uint32 ttl_seconds = 4; // session length -> nft set-element timeout
  uint64 quota_bytes = 5; // 0 = unlimited
  uint64 rate_bps    = 6; // 0 = unlimited
  string tier        = 7; // public | home | retail
  string session_id  = 8; // control-plane issued (== RADIUS Acct-Session-Id)
}

message GrantReply {
  string session_id = 1;
  bool   accepted   = 2;
}

enum RevokeReason {
  REVOKE_ADMIN      = 0;
  REVOKE_QUOTA      = 1;
  REVOKE_MAC_CHANGE = 2;
}

message RevokeRequest {
  string       client_mac = 1;
  RevokeReason reason     = 2;
}

message Ack {
  bool   ok      = 1;
  string message = 2;
}

message Key {
  string client_mac = 1;
}

message ListRequest {
  uint32 page_size  = 1; // 0 = server default
  string page_token = 2;
}

message SessionInfo {
  string session_id      = 1;
  string client_mac      = 2;
  string client_ip       = 3;
  string tier            = 4;
  int64  granted_at_unix = 5;
  uint32 expires_in_secs = 6;
  uint64 quota_bytes     = 7;
  uint64 rate_bps        = 8;
  uint64 bytes_in        = 9;
  uint64 bytes_out       = 10;
}

enum EventKind {
  GRANTED        = 0;
  INTERIM        = 1;
  EXPIRED        = 2;
  REVOKED        = 3;
  QUOTA_EXCEEDED = 4;
  IDLE_TIMEOUT   = 5; // no metered traffic within idle_timeout (Idle-Timeout)
}

message SessionEvent {
  string    session_id = 1;
  string    client_mac = 2;
  EventKind kind       = 3;
  uint64    bytes_in   = 4;
  uint64    bytes_out  = 5;
  int64     ts_unix    = 6;
  // Monotonic per engine boot, starting at 1 (epoch = EngineInfo.boot_id).
  // 0 = pre-replay engine. The control plane persists (boot_id, seq) as its
  // consumption cursor and resumes via StreamReq.resume_after_seq.
  uint64    seq        = 7;
}

message StreamReq {
  string store_id = 1;
  // Replay events with seq > resume_after_seq still in the engine's in-RAM
  // buffer, then continue live; if evicted, start at the oldest retained event.
  uint64 resume_after_seq = 2;
  // The boot_id the cursor belongs to; empty/mismatched => engine replays all.
  string boot_id = 3;
}

message HealthReply {
  bool backend_ok            = 1;
  bool kernel_table_present  = 2;
  bool cp_connected          = 3;
  bool last_reconcile_ok     = 4;
  bool enforcement_enabled   = 5; // global gate state (true = blocking unauth traffic)
}

// ---------------------------------------------------------------------------
// Config-push + introspection (carried unary on-net, or as ControlFrame/
// EngineFrame variants over Attach behind CGNAT).
// ---------------------------------------------------------------------------

message SetEnforcementRequest {
  bool enabled = 1;
}

message SetGardenRequest {
  repeated string fqdns = 1;
}

message TierPolicy {
  string tier        = 1; // [a-z0-9_-]{1,32} (conventional: public | home | retail); control plane owns the set
  uint32 ttl_seconds = 2; // 0 = unset -> engine built-in default (1800s)
  uint64 quota_bytes = 3; // 0 = unset -> unlimited
  uint64 rate_bps    = 4; // 0 = unset -> unlimited
}

message SetTierPoliciesRequest {
  repeated TierPolicy policies = 1;
}

message SetEngineParametersRequest {
  uint32 accounting_interval_secs = 1; // 0 = default 15;   bounds [1, 3600]
  uint32 garden_tick_secs         = 2; // 0 = default 30;   bounds [5, 3600]
  uint32 expiry_tick_secs         = 3; // 0 = default 1;    bounds [1, 60]
  uint32 max_sessions             = 4; // 0 = default 4096; bounds [1, 16384]
  // Idle-Timeout equivalent. UNLIKE the fields above, 0 = DISABLED (not a
  // default); when set, bounds are [30, 86400].
  uint32 idle_timeout_secs        = 5; // 0 = disabled;     bounds [30, 86400]
}

message EngineInfo {
  string version = 1;               // engine CARGO_PKG_VERSION, e.g. "0.4.0"
  string boot_id = 2;               // random per daemon start; event-seq epoch
  uint64 event_latest_seq = 3;      // 0 = no events emitted yet this boot
  uint64 event_oldest_seq = 4;      // oldest seq still replayable (0 = none)
  repeated string capabilities = 5; // e.g. "tier_policies","engine_params","event_replay","shaper"
  bool   enforcement_enabled = 6;
  string tier_policies_hash = 7;
  string engine_params_hash = 8;
  string garden_hash = 9;
}

message MetricsReply {
  uint64 sessions_active           = 1;  // gauge
  uint64 grants_total              = 2;
  uint64 grant_failures_total      = 3;  // incl. writer/kernel errors during grant
  uint64 revokes_total             = 4;
  uint64 expires_total             = 5;
  uint64 quota_kills_total         = 6;
  uint64 events_emitted_total      = 7;  // == EventLog latest_seq
  uint64 events_evicted_total      = 8;  // events pushed out of the replay buffer
  uint64 shaper_failures_total     = 9;
  uint64 redirect_rejections_total = 10; // rate-limiter rejections on the :8080 responder
  uint64 rss_bytes                 = 11; // /proc/self/status VmRSS (0 if unreadable)
  uint64 uptime_secs               = 12;
  uint64 idle_kills_total          = 13; // sessions torn down for idle_timeout
}

message Empty {}
