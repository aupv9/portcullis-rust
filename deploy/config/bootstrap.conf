# WifiHub self-hosted ZTP — batch bootstrap config for portcullis-enroll.
# Baked into the golden image (NOT per-device). The per-device identity (serial,
# mTLS cert, HMAC key) is obtained at first boot via claim-by-serial; only these
# batch-wide values live here. A conffile: survives sysupgrade.
#
# SECURITY: FLEET_SECRET is the claim credential (the router signs its claim with
# HMAC(FLEET_SECRET, serial|mac|ts); it never leaves the device). It must equal
# ONE of the CP's FLEET_BOOTSTRAP_SECRETS entries. Fill it per image batch (e.g.
# `openssl rand -hex 32`) and rotate by re-imaging. Leave empty to disable ZTP.

# CP domain the engine dials (must match the edge cert SAN / CP_SERVER_NAME).
CP_DOMAIN="cp.wifihub.internal"

# Dev/LAN without real DNS: pin CP_DOMAIN to this IP in /etc/hosts. Leave EMPTY in
# prod (real DNS resolves the domain).
CP_RESOLVE_IP=""

# Claim endpoint. Defaults to https://$CP_DOMAIN/api/enroll/claim if left empty.
CLAIM_URL="https://cp.wifihub.internal/api/enroll/claim"

# Shared fleet bootstrap secret (raw HMAC key). FILL PER BATCH. Empty = ZTP off.
FLEET_SECRET=""

# Fallback WAN interface whose MAC is reported at claim (audit). The agent first
# derives it from `uci get network.wan.device` (RUTM11 = `wan`, NOT eth1); this is
# only used if that lookup is empty.
WAN_IF="wan"
