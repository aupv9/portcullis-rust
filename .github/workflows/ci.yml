name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref (saves minutes on rapid pushes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Gate: build + lint + test on the host (the CI-equivalent — the ruleset
  # logic is arch-independent). protoc is vendored by the build script, so no
  # system protobuf-compiler install is needed.
  test:
    name: build · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --locked

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      # Non-blocking: surfaces formatting drift without failing the gate on
      # pre-existing style (the correctness gates above are what matter).
      - name: Format check (informational)
        run: cargo fmt --all -- --check
        continue-on-error: true

  # Linux network-namespace integration + fault-injection suite (G9, TDD §15):
  # asserts the real `inet wifihub` ruleset verdicts + restart adoption against a
  # live kernel. Needs root (CAP_NET_ADMIN) + nft/ip/curl/nc, so it is separate
  # from the arch-independent gate above and its cases are `#[ignore]` (plain
  # `cargo test` skips them). Serial: the namespaces + the :8080 port are global
  # kernel state.
  #
  # `continue-on-error` while the harness is first shaken out on a real runner
  # (it cannot be exercised on the dev macOS host) — flip to blocking once green.
  netns:
    name: netns integration (privileged)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install netns tooling
        run: sudo apt-get update && sudo apt-get install -y nftables iproute2 netcat-openbsd curl

      - name: Build daemon + test
        run: cargo test -p portcullis-engined --test netns --locked --no-run

      - name: Run netns suite (root, serial)
        run: sudo -E env "PATH=$PATH" cargo test -p portcullis-engined --test netns --locked -- --ignored --test-threads=1

# NOTE: cross-compiling to mipsel-unknown-linux-musl (the RUTM11 target) is a
# Rust tier-3 build (no prebuilt std) and is done with the RutOS/OpenWrt SDK
# (`-Z build-std`), not generic CI — see deploy/README.md (TDD §5.3, §16 POC).
