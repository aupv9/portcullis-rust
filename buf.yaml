version: v2
# portcullis owns this proto (the engine's contract). Kept WIRE-COMPATIBLE with
# the control plane's copy at domain/server/proto (same package
# wifihub.enforcement.v1, same field tags) — two folders, one wire.
modules:
  - path: proto
lint:
  use:
    - STANDARD
  # Wire-frozen contract: these rules would force renames that break the wire /
  # both codegens. Deferred to a coordinated v2. Structural + casing rules stay on.
  except:
    - PACKAGE_DIRECTORY_MATCH
    - SERVICE_SUFFIX
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
breaking:
  use:
    - WIRE_JSON
